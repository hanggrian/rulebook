version: 2.1

orbs:
  codecov: codecov/codecov@5.4.3

executors:
  base:
    docker:
      - image: cimg/base:current
  multiplatform:
    docker:
      - image: hanggrian/cimg-multiplatform:openjdk21.0-python3.14-node

jobs:
  setup-workspace:
    executor: base
    steps:
      - checkout
      - persist_to_workspace:
          root: .
          paths: [.]
  run-lint:
    executor: multiplatform
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Check JVM
          command: ./gradlew check
      - run:
          name: Check Python
          command: |
            uv sync
            uv run pylint rulebook-pylint/ --ignore-paths=rulebook-pylint/tests/resources/
            uv run pylint rulebook-cppcheck/
            uv run pylint sample/python/
            uv run pylint --rcfile=sample-configured/custom_pylintrc sample-configured/python/
      - run:
          name: Check C/C++
          command: |
            uv run cppcheck \
              --enable=performance,portability,style,warning \
              --addon=addon.json \
              sample/c/*.c \
              sample/cpp/*.cpp
            uv run cppcheck \
              --enable=performance,portability,style,warning \
              --addon=sample-configured/custom_addon.json \
              sample-configured/c/*.c \
              sample-configured/cpp/*.cpp
      - run:
          name: Check JS/TS
          command: |
            pnpm i
            pnpm -r build
            pnpm lint
            pnpm lint2
  upload-coverage:
    executor: multiplatform
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Report JVM
          command: ./gradlew koverXmlReport
      - run:
          name: Report Python
          command: |
            uv sync
            uv run pytest rulebook-cppcheck/ --cov=rulebook-cppcheck
            uv run pytest rulebook-pylint/ --cov=rulebook-pylint --cov-append
            uv run coverage xml
      - run:
          name: Report JS/TS
          command: |
            pnpm i
            pnpm -r test
            pnpm -r coverage
      - codecov/upload

workflows:
  code-analysis:
    jobs:
      - setup-workspace
      - run-lint:
          requires: [setup-workspace]
      - upload-coverage:
          requires: [setup-workspace]
