name: Setup Workspace
description: Checkout and install all dependencies

runs:
  using: composite
  steps:
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21

    - uses: astral-sh/setup-uv@v7
      with:
        python-version: '3.14'

    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: pnpm

    - uses: actions/cache@v5
      with:
        path: |
          ${{ github.workspace }}/.gradle/caches/modules-2/
          ${{ github.workspace }}/.gradle/wrapper/
        key: gradle-${{ hashFiles('gradle/libs.versions.toml') }}

    - uses: actions/cache@v5
      with:
        path: .venv/
        key: uv-${{ hashFiles('uv.lock') }}

    - uses: actions/cache@v5
      with:
        path: |
          .pnpm-store/
          node_modules/
        key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

    - shell: bash
      run: |
        uv sync

        echo 'workspace-concurrency=1' >> .npmrc
        pnpm i
        pnpm -r build
